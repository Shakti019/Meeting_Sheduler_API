<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MeetFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-8 border border-slate-100">
        <div>
            <h2 class="text-center text-3xl font-extrabold text-slate-900">Create an account</h2>
            <p class="mt-2 text-center text-sm text-slate-600">
                Already have an account? <a href="/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition">Sign in</a>
            </p>
        </div>
        
        <form id="registerForm" class="mt-8 space-y-6">
            <div id="errorArea" class="hidden rounded-md bg-red-50 p-4 mb-4">
                <p class="text-sm text-red-700 font-medium" id="errorText"></p>
            </div>
            <div class="space-y-4">
                <div>
                    <label for="firstname" class="block text-sm font-medium text-slate-700">First Name</label>
                    <input id="firstname" name="firstname" type="text" required 
                           class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition">
                </div>
                <div>
                    <label for="lastname" class="block text-sm font-medium text-slate-700">Last Name</label>
                    <input id="lastname" name="lastname" type="text" required 
                           class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required 
                           class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required 
                           class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition">
                </div>
            </div>

            <div>
                <button type="submit" id="submitBtn" 
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition shadow-md">
                    Sign up
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstname = document.getElementById('firstname').value;
            const lastname = document.getElementById('lastname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('submitBtn');
            const errorArea = document.getElementById('errorArea');
            const errorText = document.getElementById('errorText');

            btn.disabled = true;
            btn.innerHTML = 'Creating account...';
            errorArea.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstname, lastname, email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token); // Assuming AuthResponse contains 'token'
                    window.location.href = '/dashboard';
                } else {
                    errorText.textContent = 'Registration failed. User may already exist.';
                    errorArea.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = 'An error occurred. Make sure the API is running.';
                errorArea.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign up';
            }
        });
    </script>
</body>
</html>
