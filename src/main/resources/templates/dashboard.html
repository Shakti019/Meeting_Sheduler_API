<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MeetFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-indigo-600 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center text-white">
                    <span class="text-2xl font-bold">MeetFlow</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="/schedule" class="text-indigo-100 hover:text-white font-medium transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        New Event Type
                    </a>
                    <button id="logoutBtn" class="bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-800 transition shadow-sm">
                        Log out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 text-slate-900">
        
        <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">Event Types</h1>
                <p class="mt-2 text-sm text-slate-500">Manage your scheduling links and events.</p>
            </div>
            <a href="/schedule" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow-sm flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Event
            </a>
        </div>

        <!-- Events Table -->
        <div id="loading" class="text-center py-10 hidden text-slate-500">Loading your events...</div>
        <div id="error" class="text-center py-10 hidden text-red-500">Failed to load events.</div>
        <div id="noEvents" class="text-center py-20 hidden text-slate-500 bg-white rounded-xl shadow-sm border border-slate-100">
            You don't have any events yet. <a href="/schedule" class="text-indigo-600 font-medium hover:underline">Create one</a> to get started!
        </div>

        <div id="eventsContainer" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto overflow-y-auto max-h-[500px] scrollbar-hide">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50 sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Title</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Description</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Panel Members</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Start Time</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">End Time</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Duration</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="eventsTableBody" class="bg-white divide-y divide-slate-200">
                            <!-- Events rendered here by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <style>
        /* Hidden Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        async function fetchMeetings() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const noEvents = document.getElementById('noEvents');
            const eventsContainer = document.getElementById('eventsContainer');
            const eventsTableBody = document.getElementById('eventsTableBody');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            noEvents.classList.add('hidden');
            eventsContainer.classList.add('hidden');

            try {
                // Fetch mapping of all users
                let userMap = {};
                try {
                    const uRes = await fetch('/api/auth/users', { headers: { 'Authorization': 'Bearer ' + token }});
                    if (uRes.ok) {
                        const usersData = await uRes.json();
                        usersData.forEach(u => userMap[u.email] = u.name || u.email.split('@')[0]);
                    }
                } catch(e) {}

                // Calling your backend API /api/meetings
                // We fetch all meetings to display ordered priorities, 
                // but we decode the user's email from JWT to only allow edit/delete for their own meetings.
                const res = await fetch('/api/meetings', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return;
                }

                if (!res.ok) throw new Error('API Error');
                
                const data = await res.json();
                loading.classList.add('hidden');

                if (data.length === 0) {
                    noEvents.classList.remove('hidden');
                } else {
                    eventsTableBody.innerHTML = '';
                    
                    // Sort chronologically
                    data.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

                    // Decode JWT to get the current user's email
                    const userEmail = JSON.parse(atob(token.split('.')[1])).sub;

                    data.forEach(meeting => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 transition-colors";
                        
                        let durationMsg = '0 mins';
                        let startDisplay = 'N/A';
                        let endDisplay = 'N/A';

                        const getFriendlyTime = (date) => {
                            const hr = date.getHours();
                            if (hr >= 5 && hr < 12) return 'Morning';
                            if (hr >= 12 && hr < 17) return 'Afternoon';
                            if (hr >= 17 && hr < 21) return 'Evening';
                            return 'Night';
                        };

                        if (meeting.startTime && meeting.endTime) {
                             const st = new Date(meeting.startTime);
                             const et = new Date(meeting.endTime);
                             durationMsg = Math.round((et - st) / 60000) + ' mins';
                             startDisplay = `${st.toLocaleString([], {dateStyle:'medium', timeStyle:'short'})} <span class="text-xs text-slate-400 font-normal">(${getFriendlyTime(st)})</span>`;
                             endDisplay = `${et.toLocaleString([], {dateStyle:'medium', timeStyle:'short'})} <span class="text-xs text-slate-400 font-normal">(${getFriendlyTime(et)})</span>`;
                        }

                        const descDisplay = meeting.description && meeting.description.length > 30 ? meeting.description.substring(0, 30) + '...' : (meeting.description || '');
                        
                        let panelMembersText = '<span class="text-xs text-slate-400">None</span>';
                        if (meeting.panelMembers && meeting.panelMembers.length > 0) {
                            panelMembersText = meeting.panelMembers.map(email => {
                                const name = userMap[email] || email.split('@')[0];
                                return `<span class="inline-block bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-md border border-slate-200 mb-1 mr-1">${name}</span>`;
                            }).join('');
                        }

                        const isOwner = (meeting.organizerEmail === userEmail);

                        let actionsHtml = `<span class="text-xs text-slate-400 uppercase tracking-widest">(View Only)</span>`;
                        if (isOwner) {
                            actionsHtml = `
                                <a href="/edit/${meeting.id}" class="text-indigo-600 hover:text-indigo-900 mr-4">Edit</a>
                                <button onclick="deleteEvent('${meeting.id}')" class="text-red-500 hover:text-red-700">Delete</button>
                            `;
                        }

                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900">
                                <div class="flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full ${new Date(meeting.startTime) > new Date() ? 'bg-green-500' : 'bg-slate-300'}"></span>
                                    ${meeting.title || 'Untitled Event'}
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500" title="${meeting.description || ''}">${descDisplay}</td>
                            <td class="px-6 py-4 max-w-[200px] flex-wrap text-sm text-slate-700">${panelMembersText}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">${startDisplay}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">${endDisplay}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${durationMsg}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                ${actionsHtml}
                            </td>
                        `;
                        eventsTableBody.appendChild(tr);
                    });
                    eventsContainer.classList.remove('hidden');
                }

            } catch (err) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
            }
        }

        async function deleteEvent(id) {
            if(!confirm('Delete this event?')) return;
            try {
                const res = await fetch('/api/meetings/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if(res.ok) {
                    fetchMeetings();
                } else {
                    alert('Failed to delete.');
                }
            } catch(e) { console.error(e); }
        }

        fetchMeetings();
    </script>
</body>
</html>
